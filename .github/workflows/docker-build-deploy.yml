name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the configured server after images are built
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      platforms:
        description: Target Docker platforms
        required: true
        default: linux/arm64
        type: string
      runner:
        description: Build runner. Auto prefers the local Mac when it is online and falls back to GitHub-hosted.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - github-hosted
          - self-hosted-mac-arm64
      services:
        description: "auto, all, or comma-separated services: backend-web,websocket,scheduler,frontend"
        required: true
        default: auto
        type: string

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: xianyu-auto-reply-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: endlessjy
  PYTHON_BASE_IMAGE: xianyu-auto-reply-python-base

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      base_changed: ${{ steps.plan.outputs.base_changed }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
      matrix: ${{ steps.plan.outputs.matrix }}
      platforms: ${{ steps.plan.outputs.platforms }}
      python_base_tag: ${{ steps.plan.outputs.python_base_tag }}
      local_runner_status: ${{ steps.plan.outputs.local_runner_status }}
      runner_kind: ${{ steps.plan.outputs.runner_kind }}
      runner_labels: ${{ steps.plan.outputs.runner_labels }}
      services_csv: ${{ steps.plan.outputs.services_csv }}
      use_qemu: ${{ steps.plan.outputs.use_qemu }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          SERVICES_INPUT: ${{ inputs.services || 'auto' }}
          RUNNER_INPUT: ${{ inputs.runner || 'auto' }}
          PLATFORMS_INPUT: ${{ inputs.platforms || 'linux/arm64' }}
          RUNNER_API_TOKEN: ${{ secrets.LOCAL_RUNNER_ADMIN_TOKEN || github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request

          all_services = ["backend-web", "websocket", "scheduler", "frontend"]
          python_services = ["backend-web", "websocket", "scheduler"]
          local_runner_name = "endlessjy-mac-arm64-xianyu-auto-reply"
          local_runner_labels = {"self-hosted", "macOS", "ARM64", "xianyu-auto-reply", "mac-arm64-build"}
          service_meta = {
              "backend-web": {
                  "dockerfile": "backend-web/Dockerfile",
                  "image": "xianyu-auto-reply-backend-web",
              },
              "websocket": {
                  "dockerfile": "websocket/Dockerfile",
                  "image": "xianyu-auto-reply-websocket",
              },
              "scheduler": {
                  "dockerfile": "scheduler/Dockerfile",
                  "image": "xianyu-auto-reply-scheduler",
              },
              "frontend": {
                  "dockerfile": "docker/frontend/Dockerfile",
                  "image": "xianyu-auto-reply-frontend",
              },
          }

          event_name = os.environ["EVENT_NAME"]
          services_input = (os.environ.get("SERVICES_INPUT") or "auto").strip()
          runner_input = (os.environ.get("RUNNER_INPUT") or "github-hosted").strip()
          platforms = (os.environ.get("PLATFORMS_INPUT") or "linux/arm64").strip()
          sha = os.environ["GITHUB_SHA"]

          def run_git(args):
              return subprocess.check_output(["git", *args], text=True).strip()

          def changed_files():
              before = (os.environ.get("BEFORE_SHA") or "").strip()
              if not before or set(before) == {"0"}:
                  try:
                      before = run_git(["rev-parse", "HEAD^"])
                  except Exception:
                      return None
              try:
                  output = run_git(["diff", "--name-only", before, sha])
              except Exception:
                  return None
              return [line for line in output.splitlines() if line]

          def local_runner_supports_platforms():
              requested_platforms = [item.strip() for item in platforms.split(",") if item.strip()]
              return requested_platforms and all(platform == "linux/arm64" for platform in requested_platforms)

          def local_runner_available():
              if not local_runner_supports_platforms():
                  return False, f"local Mac supports linux/arm64 only; requested {platforms}"

              token = (os.environ.get("RUNNER_API_TOKEN") or "").strip()
              if not token:
                  return False, "runner API token is missing"

              api_url = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
              repository = os.environ["GITHUB_REPOSITORY"]
              request = urllib.request.Request(
                  f"{api_url}/repos/{repository}/actions/runners?per_page=100",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "User-Agent": "xianyu-auto-reply-runner-detect",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )

              try:
                  with urllib.request.urlopen(request, timeout=15) as response:
                      payload = json.load(response)
              except urllib.error.HTTPError as exc:
                  return False, f"runner API returned HTTP {exc.code}"
              except Exception as exc:
                  return False, f"runner API check failed: {exc}"

              for runner in payload.get("runners", []):
                  labels = {label.get("name") for label in runner.get("labels", [])}
                  if runner.get("name") == local_runner_name or local_runner_labels.issubset(labels):
                      name = runner.get("name", local_runner_name)
                      status = runner.get("status", "unknown")
                      busy = runner.get("busy", True)
                      if status == "online" and busy is False:
                          return True, f"{name} is online and idle"
                      return False, f"{name} status={status} busy={busy}"

              return False, f"{local_runner_name} was not found"

          requested = services_input.lower()
          base_changed = False
          selected = set()

          if requested and requested not in {"auto", "all"}:
              for item in services_input.split(","):
                  service = item.strip()
                  if service:
                      if service not in all_services:
                          raise SystemExit(f"Unknown service in services input: {service}")
                      selected.add(service)
          elif requested == "all":
              selected.update(all_services)
              base_changed = True
          else:
              files = changed_files()
              if files is None:
                  selected.update(all_services)
                  base_changed = True
              else:
                  for path in files:
                      if path in {
                          "docker/base/python-playwright/Dockerfile",
                          "backend-web/pyproject.toml",
                          "websocket/pyproject.toml",
                          "scheduler/pyproject.toml",
                      }:
                          base_changed = True
                          selected.update(python_services)
                      elif path.startswith("docker/base/"):
                          base_changed = True
                          selected.update(python_services)
                      elif path.startswith("common/") or path.startswith("launcher/"):
                          selected.update(python_services)
                      elif path.startswith("backend-web/"):
                          selected.add("backend-web")
                      elif path.startswith("websocket/"):
                          selected.add("websocket")
                      elif path.startswith("scheduler/"):
                          selected.add("scheduler")
                      elif path.startswith("frontend/") or path.startswith("docker/frontend/"):
                          selected.add("frontend")

          services = [service for service in all_services if service in selected]
          if base_changed and not any(service in services for service in python_services):
              services = python_services + [service for service in services if service not in python_services]

          has_changes = bool(services)
          matrix_services = services or ["frontend"]
          matrix = {
              "include": [
                  {
                      "service": service,
                      "dockerfile": service_meta[service]["dockerfile"],
                      "image": service_meta[service]["image"],
                  }
                  for service in matrix_services
              ]
          }

          if runner_input not in {"auto", "github-hosted", "self-hosted-mac-arm64"}:
              raise SystemExit(f"Unknown runner input: {runner_input}")

          use_local_mac = False
          local_runner_status = "github-hosted requested"
          if runner_input in {"auto", "self-hosted-mac-arm64"}:
              use_local_mac, local_runner_status = local_runner_available()
              if not use_local_mac:
                  local_runner_status = f"{local_runner_status}; falling back to github-hosted"

          runner_kind = "self-hosted-mac-arm64" if use_local_mac else "github-hosted"
          runner_labels = sorted(local_runner_labels) if use_local_mac else "ubuntu-latest"
          use_qemu = not use_local_mac
          python_base_tag = sha if base_changed else "latest"

          outputs = {
              "base_changed": str(base_changed).lower(),
              "has_changes": str(has_changes).lower(),
              "local_runner_status": local_runner_status,
              "matrix": json.dumps(matrix, separators=(",", ":")),
              "platforms": platforms,
              "python_base_tag": python_base_tag,
              "runner_kind": runner_kind,
              "runner_labels": json.dumps(runner_labels),
              "services_csv": ",".join(services),
              "use_qemu": str(use_qemu).lower(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")

          print("Build plan:")
          print(json.dumps(outputs, ensure_ascii=False, indent=2))
          PY

  build-python-base:
    name: Build Python base
    runs-on: ${{ fromJSON(needs.detect.outputs.runner_labels) }}
    needs: detect
    if: needs.detect.outputs.base_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          mkdir -p "$RUNNER_TEMP/.docker"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/.docker" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: needs.detect.outputs.use_qemu == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Python base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/python-playwright/Dockerfile
          platforms: ${{ needs.detect.outputs.platforms }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.PYTHON_BASE_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.PYTHON_BASE_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=python-base
          cache-to: type=gha,mode=max,scope=python-base

  build:
    name: Build ${{ matrix.service }}
    runs-on: ${{ fromJSON(needs.detect.outputs.runner_labels) }}
    needs:
      - detect
      - build-python-base
    if: |
      always() &&
      needs.detect.outputs.has_changes == 'true' &&
      (needs.build-python-base.result == 'success' || needs.build-python-base.result == 'skipped')
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          mkdir -p "$RUNNER_TEMP/.docker"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/.docker" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: needs.detect.outputs.use_qemu == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ needs.detect.outputs.platforms }}
          push: true
          build-args: |
            PYTHON_BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.PYTHON_BASE_IMAGE }}:${{ needs.detect.outputs.python_base_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - detect
      - build
    if: |
      always() &&
      needs.detect.outputs.has_changes == 'true' &&
      needs.build.result == 'success' &&
      (github.event_name == 'push' || inputs.deploy == 'true')
    environment: production

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.XIANYU_DEPLOY_SSH_KEY }}" > ~/.ssh/xianyu_deploy_key
          chmod 600 ~/.ssh/xianyu_deploy_key
          ssh-keyscan -p "${{ secrets.XIANYU_DEPLOY_PORT }}" "${{ secrets.XIANYU_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.XIANYU_DEPLOY_PATH }}'"

          scp -i ~/.ssh/xianyu_deploy_key -P "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            deploy/docker-compose.ghcr.yml \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}:${{ secrets.XIANYU_DEPLOY_PATH }}/docker-compose.yml"

          scp -i ~/.ssh/xianyu_deploy_key -P "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            deploy/production.env.example \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}:${{ secrets.XIANYU_DEPLOY_PATH }}/production.env.example"

          scp -i ~/.ssh/xianyu_deploy_key -P "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            scripts/remote-deploy-ghcr.sh \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}:${{ secrets.XIANYU_DEPLOY_PATH }}/remote-deploy-ghcr.sh"

      - name: Pull and restart changed services
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

          ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "chmod +x '${{ secrets.XIANYU_DEPLOY_PATH }}/remote-deploy-ghcr.sh' && '${{ secrets.XIANYU_DEPLOY_PATH }}/remote-deploy-ghcr.sh' '${{ secrets.XIANYU_DEPLOY_PATH }}' '${{ github.sha }}' '${{ needs.detect.outputs.services_csv }}'"

          ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "docker logout ghcr.io || true"
