name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the configured server after images are built
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      platforms:
        description: Target Docker platforms
        required: true
        default: linux/arm64

permissions:
  contents: read
  packages: write

concurrency:
  group: xianyu-auto-reply-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: endlessjy

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend-web
            dockerfile: backend-web/Dockerfile
            image: xianyu-auto-reply-backend-web
          - service: websocket
            dockerfile: websocket/Dockerfile
            image: xianyu-auto-reply-websocket
          - service: scheduler
            dockerfile: scheduler/Dockerfile
            image: xianyu-auto-reply-scheduler
          - service: frontend
            dockerfile: docker/frontend/Dockerfile
            image: xianyu-auto-reply-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || inputs.deploy == 'true'
    environment: production

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.XIANYU_DEPLOY_SSH_KEY }}" > ~/.ssh/xianyu_deploy_key
          chmod 600 ~/.ssh/xianyu_deploy_key
          ssh-keyscan -p "${{ secrets.XIANYU_DEPLOY_PORT }}" "${{ secrets.XIANYU_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.XIANYU_DEPLOY_PATH }}'"

          scp -i ~/.ssh/xianyu_deploy_key -P "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            deploy/docker-compose.ghcr.yml \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}:${{ secrets.XIANYU_DEPLOY_PATH }}/docker-compose.yml"

          scp -i ~/.ssh/xianyu_deploy_key -P "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            deploy/production.env.example \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}:${{ secrets.XIANYU_DEPLOY_PATH }}/production.env.example"

          scp -i ~/.ssh/xianyu_deploy_key -P "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            scripts/remote-deploy-ghcr.sh \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}:${{ secrets.XIANYU_DEPLOY_PATH }}/remote-deploy-ghcr.sh"

      - name: Pull and restart services
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"

          ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "chmod +x '${{ secrets.XIANYU_DEPLOY_PATH }}/remote-deploy-ghcr.sh' && '${{ secrets.XIANYU_DEPLOY_PATH }}/remote-deploy-ghcr.sh' '${{ secrets.XIANYU_DEPLOY_PATH }}' '${{ github.sha }}'"

          ssh -i ~/.ssh/xianyu_deploy_key -p "${{ secrets.XIANYU_DEPLOY_PORT }}" \
            "${{ secrets.XIANYU_DEPLOY_USER }}@${{ secrets.XIANYU_DEPLOY_HOST }}" \
            "docker logout ghcr.io || true"
